# Eine Nextcloud-Instanz: cloud.example.com
# Wird vom zentralen Traefik (siehe /proxy) automatisch erkannt und mit SSL versorgt.
services:

  nextcloud:
    image: nextcloud:fpm-alpine
    container_name: nc-example-app
    restart: unless-stopped
    networks:
      - internal
    depends_on:
      - redis
    volumes:
      - nc-app:/var/www/html
      - nc-config:/var/www/html/config
      - nc-custom-apps:/var/www/html/custom_apps
      - nc-themes:/var/www/html/themes
      - /mnt/nextcloud-data:/var/www/html/data        # NFS-Mount → Storage-Box
    environment:
      - MYSQL_HOST=${DB_HOST}
      - MYSQL_DATABASE=${DB_NAME}
      - MYSQL_USER=${DB_USER}
      - MYSQL_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - NEXTCLOUD_TRUSTED_DOMAINS=${DOMAIN}
      - OVERWRITEPROTOCOL=https
      - OVERWRITECLIURL=https://${DOMAIN}
      - PHP_MEMORY_LIMIT=1G
      - PHP_UPLOAD_LIMIT=2G

  web:
    image: nginx:alpine
    container_name: nc-example-web
    restart: unless-stopped
    networks:
      - internal
      - traefik-public
    depends_on:
      - nextcloud
    volumes:
      - nc-app:/var/www/html:ro
      - /mnt/nextcloud-data:/var/www/html/data:ro
      - ./nginx/nextcloud.conf:/etc/nginx/conf.d/default.conf:ro
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      # HTTPS-Router
      - "traefik.http.routers.example.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.example.entrypoints=websecure"
      - "traefik.http.routers.example.tls=true"
      - "traefik.http.routers.example.tls.certresolver=letsencrypt"
      - "traefik.http.services.example.loadbalancer.server.port=80"
      # Nextcloud-spezifische Header + Redirects
      - "traefik.http.middlewares.example-headers.headers.stsSeconds=15768000"
      - "traefik.http.middlewares.example-headers.headers.stsIncludeSubdomains=true"
      - "traefik.http.middlewares.example-headers.headers.stsPreload=true"
      - "traefik.http.middlewares.example-headers.headers.contentTypeNosniff=true"
      - "traefik.http.middlewares.example-headers.headers.referrerPolicy=no-referrer"
      - "traefik.http.middlewares.example-redirect.redirectregex.regex=^https?://([^/]+)/.well-known/(card|cal)dav$$"
      - "traefik.http.middlewares.example-redirect.redirectregex.replacement=https://$${1}/remote.php/dav/"
      - "traefik.http.middlewares.example-redirect.redirectregex.permanent=true"
      - "traefik.http.routers.example.middlewares=example-headers,example-redirect"

  redis:
    image: redis:alpine
    container_name: nc-example-redis
    restart: unless-stopped
    networks:
      - internal
    command: ["redis-server", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]

  cron:
    image: nextcloud:fpm-alpine
    container_name: nc-example-cron
    restart: unless-stopped
    networks:
      - internal
    depends_on:
      - nextcloud
    volumes:
      - nc-app:/var/www/html
      - nc-config:/var/www/html/config
      - nc-custom-apps:/var/www/html/custom_apps
      - nc-themes:/var/www/html/themes
      - /mnt/nextcloud-data:/var/www/html/data
    entrypoint: /cron.sh

networks:
  internal:
    driver: bridge
  traefik-public:
    external: true

volumes:
  nc-app:
  nc-config:
  nc-custom-apps:
  nc-themes:
