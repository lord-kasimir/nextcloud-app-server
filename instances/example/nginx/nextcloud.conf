# Internes nginx pro Nextcloud-Instanz.
# Spricht intern PHP-FPM an, lauscht auf Port 80.
# SSL und externes Routing übernimmt Traefik.

upstream php-handler {
    server nextcloud:9000;
}

# Rate-Limiting gegen Brute-Force (Login-Endpunkte)
# 10 Requests/Sekunde sind großzügig genug für NC-Sync-Clients,
# stoppen aber Passwort-Probier-Angriffe wirksam.
limit_req_zone $binary_remote_addr zone=NextcloudRateLimit:10m rate=10r/s;

# Cache-Control: Querystring-Versionierung erlaubt aggressives Caching
map $arg_v $asset_immutable {
    "" "";
    default ", immutable";
}

server {
    listen 80;
    server_name _;

    # Security-Header werden teilweise von Traefik gesetzt — hier nur die NC-spezifischen
    fastcgi_hide_header X-Powered-By;
    server_tokens off;
    add_header Permissions-Policy "interest-cohort=()" always;

    root /var/www/html;
    index index.php index.html /index.php$request_uri;

    client_max_body_size 10G;
    client_body_timeout 300s;
    fastcgi_buffers 64 4K;

    location = / {
        if ( $http_user_agent ~ ^DavClnt ) {
            return 302 /remote.php/webdav/$is_args$args;
        }
    }

    location = /robots.txt {
        allow all;
        log_not_found off;
        access_log off;
    }

    location ^~ /.well-known {
        location = /.well-known/carddav { return 301 /remote.php/dav/; }
        location = /.well-known/caldav  { return 301 /remote.php/dav/; }
        return 301 /index.php$request_uri;
    }

    # Login-Endpunkt mit Rate-Limit (Brute-Force-Schutz)
    location = /index.php {
        limit_req zone=NextcloudRateLimit burst=20 nodelay;

        rewrite ^/(?!index|remote|public|cron|core/ajax/update|status|ocs/v[12]|updater/.+|oc[ms]-provider/.+|.+/richdocumentscode/proxy) /index.php$request_uri;

        fastcgi_split_path_info ^(.+?\.php)(/.*)$;
        set $path_info $fastcgi_path_info;
        try_files $fastcgi_script_name =404;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $path_info;
        fastcgi_param HTTPS on;
        fastcgi_param modHeadersAvailable true;
        fastcgi_param front_controller_active true;
        fastcgi_pass php-handler;
        fastcgi_intercept_errors on;
        fastcgi_request_buffering off;
        fastcgi_max_temp_file_size 0;
    }

    location ~ ^/(?:build|tests|config|lib|3rdparty|templates|data)(?:$|/) { return 404; }
    location ~ ^/(?:\.|autotest|occ|issue|indie|db_|console)               { return 404; }

    location ~ \.php(?:$|/) {
        rewrite ^/(?!index|remote|public|cron|core/ajax/update|status|ocs/v[12]|updater/.+|oc[ms]-provider/.+|.+/richdocumentscode/proxy) /index.php$request_uri;

        fastcgi_split_path_info ^(.+?\.php)(/.*)$;
        set $path_info $fastcgi_path_info;
        try_files $fastcgi_script_name =404;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $path_info;
        fastcgi_param HTTPS on;
        fastcgi_param modHeadersAvailable true;
        fastcgi_param front_controller_active true;
        fastcgi_pass php-handler;
        fastcgi_intercept_errors on;
        fastcgi_request_buffering off;
        fastcgi_max_temp_file_size 0;
    }

    # Statische Dateien mit aggressivem Caching
    location ~ \.(?:css|js|mjs|svg|gif|png|jpg|webp|ico|wasm|tflite|map|html|ttf|woff2?)$ {
        try_files $uri /index.php$request_uri;
        add_header Cache-Control "public, max-age=15778463$asset_immutable" always;
        expires 6M;
        access_log off;
        location ~ \.wasm$ { default_type application/wasm; }
    }

    location / {
        try_files $uri $uri/ /index.php$request_uri;
    }
}
