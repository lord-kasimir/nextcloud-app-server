; PHP-FPM Pool-Settings — werden in /usr/local/etc/php-fpm.d/ gemountet.
;
; ACHTUNG: pm.max_children muss zur Server-RAM passen!
; Faustregel: (verfügbares_RAM_GB * 0.7 * 1024) / memory_limit_MB
; Bei 4 GB RAM + 1024 MB memory_limit:  ~ 3 Children
; Bei 8 GB RAM + 1024 MB memory_limit:  ~ 5 Children
; Bei 16 GB RAM + 1024 MB memory_limit: ~ 11 Children
; Bei 32 GB RAM + 1024 MB memory_limit: ~ 22 Children
;
; Diesen Wert nach Hardware anpassen — Default unten ist konservativ für 8 GB.

[www]
pm = ondemand
pm.max_children = 5
pm.start_servers = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 3
pm.process_idle_timeout = 10s
pm.max_requests = 1000
